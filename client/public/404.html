<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found | Crafted Resume</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to Crafted Resume to build your AI-powered resume." />
  <meta name="robots" content="noindex" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0f;
      color: #e2e2ea;
      font-family: 'Outfit', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    .code {
      font-size: 96px;
      font-weight: 300;
      color: #c9a84c;
      letter-spacing: -4px;
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0.8;
    }
    h1 {
      font-size: 22px;
      font-weight: 400;
      color: #e2e2ea;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #c9a84c, #e8c96d);
      color: #0d0d0f;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      margin: 4px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-ghost {
      display: inline-block;
      background: transparent;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      margin: 4px;
      transition: all 0.2s;
    }
    .btn-ghost:hover { color: #e2e2ea; border-color: rgba(255,255,255,0.3); }
    .logo {
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 0.06em;
      margin-bottom: 48px;
      color: rgba(255,255,255,0.4);
    }
    .logo span { color: #c9a84c; font-weight: 400; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Crafted<span>Resume</span></div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Head back and keep building that resume.</p>
    <div>
      <a href="/" class="btn">Go to Homepage →</a>
      <a href="/build" class="btn-ghost">Build a Resume</a>
    </div>
  </div>
</body>
</html>
