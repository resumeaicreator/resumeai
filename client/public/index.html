<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d0d0f" />

    <!-- Primary SEO -->
    <title>Crafted Resume — AI Resume Builder, Tailor &amp; Optimizer</title>
    <meta name="description" content="AI resume builder powered by Claude. Build ATS-optimised resumes, tailor to any job, optimise LinkedIn and prep for interviews." />
    <meta name="keywords" content="AI resume builder, resume tailor, ATS resume, LinkedIn optimizer, interview prep, job search, resume generator, AI career tools" />
    <meta name="author" content="Crafted Resume" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://craftedresume.io" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://craftedresume.io" />
    <meta property="og:site_name" content="Crafted Resume" />
    <meta property="og:title" content="Crafted Resume — AI Resume Builder and Career Tools" />
    <meta property="og:description" content="Build, tailor, and optimize your resume with Claude AI. Beat ATS filters, ace interviews, and find jobs faster. Try free — no sign-in required." />
    <meta property="og:image" content="https://craftedresume.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crafted Resume — AI Resume Builder and Career Tools" />
    <meta name="twitter:description" content="Build, tailor, and optimize your resume with Claude AI. Beat ATS filters, ace interviews, and find jobs faster. Try free." />
    <meta name="twitter:image" content="https://craftedresume.io/og-image.png" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Crafted Resume",
      "url": "https://craftedresume.io",
      "description": "AI-powered resume builder and career tools. Build, tailor, and optimize your resume with Claude AI. Beat ATS filters and land more interviews.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "20",
        "priceCurrency": "USD",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "price": "20",
          "priceCurrency": "USD",
          "unitCode": "MON"
        }
      },
      "featureList": [
        "AI Resume Builder",
        "Resume Tailoring for Job Descriptions",
        "ATS Score Optimization",
        "LinkedIn Profile Optimizer",
        "Interview Preparation",
        "Smart Job Search Links",
        "PDF Export"
      ]
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Crafted Resume free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — all core tools including the AI resume builder, job tailor, LinkedIn optimizer, and interview prep are free to use without signing in. Premium features like ATS scoring and resume chat require a $20/month subscription."
          }
        },
        {
          "@type": "Question",
          "name": "How does the AI resume builder work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You fill in your details — name, role, experience, skills — and Claude AI writes a professional, ATS-optimized resume in seconds. You can download it as a PDF or tailor it to specific job descriptions."
          }
        },
        {
          "@type": "Question",
          "name": "Can Crafted Resume beat ATS filters?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Our AI tailors your resume to match the exact keywords and phrases in any job description, significantly improving your ATS score and chances of getting through automated screening."
          }
        },
        {
          "@type": "Question",
          "name": "What AI model powers Crafted Resume?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Crafted Resume is powered by Claude by Anthropic — one of the most capable AI models available, known for high-quality, nuanced writing."
          }
        }
      ]
    }
    </script>

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
